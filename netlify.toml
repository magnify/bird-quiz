[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Admin - no cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Dynamic pages - no cache
[[headers]]
  for = "/rangliste"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/resultater"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

# Manifest must NOT be cached - metadata changes
[[headers]]
  for = "/api/images/manifest.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"

# Quiz images - long cache + CORS so canvas crop can use crossOrigin
[[headers]]
  for = "/api/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Netlify-CDN-Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Resource-Policy = "cross-origin"
