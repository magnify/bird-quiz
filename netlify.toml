[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Admin - no cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Dynamic pages - no cache
[[headers]]
  for = "/rangliste"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/resultater"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

# Manifest must NOT be cached - metadata changes
[[headers]]
  for = "/api/images/manifest.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"

# Quiz images - CORS only (so canvas crop can use crossOrigin). Caching is set
# per-request by the route: `no-store` for admin `?nocache` requests, 1-year for
# the public quiz. A blanket CDN cache here also cached the admin/nocache
# responses (keyed by path, ignoring the version query), so crop/replace never
# showed the new image even after a reload (#41).
[[headers]]
  for = "/api/images/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Resource-Policy = "cross-origin"
